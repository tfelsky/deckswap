<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1521"/>
      <stop offset="1" stop-color="#080d15"/>
    </linearGradient>
    <radialGradient id="glowCy" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#56c6e8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#56c6e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowEm" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2fd4a0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2fd4a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#56c6e8"/>
      <stop offset="1" stop-color="#2fd4a0"/>
    </linearGradient>
    <linearGradient id="manaW" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7f0c7"/><stop offset="1" stop-color="#eadf9d"/></linearGradient>
    <linearGradient id="manaU" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8fc7ff"/><stop offset="1" stop-color="#4b88d9"/></linearGradient>
    <linearGradient id="manaB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#726f7f"/><stop offset="1" stop-color="#2c2933"/></linearGradient>
    <linearGradient id="manaR" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff9b73"/><stop offset="1" stop-color="#d74d37"/></linearGradient>
    <linearGradient id="manaG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9dd98e"/><stop offset="1" stop-color="#3f8b54"/></linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="850" cy="520" r="540" fill="url(#glowCy)"/>
  <circle cx="220" cy="1500" r="540" fill="url(#glowEm)"/>

  <g transform="translate(80,150)">
    <path d="M0 6 L26 0 L52 6 L52 34 Q52 52 26 62 Q0 52 0 34 Z" fill="url(#accent)"/>
    <text x="40" y="30" fill="#0a0f18" font-size="22" font-weight="800" text-anchor="middle">M</text>
    <text x="72" y="22" fill="#f6f5ef" font-size="24" font-weight="700" letter-spacing="3">MYTHIVERSE EXCHANGE</text>
    <text x="72" y="50" fill="#7f8893" font-size="17" font-weight="600" letter-spacing="6">DECKSWAP</text>
  </g>

  <!-- WUBRG mana signature (from the site color chooser) -->
  <g transform="translate(80,252)">
    <circle cx="16" cy="0" r="15" fill="url(#manaW)"/>
    <circle cx="54" cy="0" r="15" fill="url(#manaU)"/>
    <circle cx="92" cy="0" r="15" fill="url(#manaB)" stroke="#ffffff" stroke-opacity="0.2"/>
    <circle cx="130" cy="0" r="15" fill="url(#manaR)"/>
    <circle cx="168" cy="0" r="15" fill="url(#manaG)"/>
    <text x="206" y="6" fill="#7f8893" font-size="18" font-weight="700" letter-spacing="3">EVERY COLOR · EVERY DECK</text>
  </g>
  <text x="1000" y="178" fill="#7f8893" font-size="22" font-weight="700" text-anchor="end" letter-spacing="2">02 / 05</text>

  <g transform="translate(80,470)">
    <rect x="0" y="0" width="372" height="58" rx="29" fill="#56c6e8" fill-opacity="0.12" stroke="#56c6e8" stroke-opacity="0.4"/>
    <circle cx="34" cy="29" r="6" fill="#56c6e8"/>
    <text x="58" y="38" fill="#a9e3f3" font-size="22" font-weight="700" letter-spacing="3">IMPORT TO LISTING</text>
  </g>

  <text x="80" y="660" fill="#f6f5ef" font-size="96" font-weight="800" letter-spacing="-2">
    <tspan x="80" dy="0">Paste a list.</tspan>
    <tspan x="80" dy="112">Get a market-</tspan>
    <tspan x="80" dy="112" fill="#56c6e8">ready deck page.</tspan>
  </text>

  <text x="80" y="1070" fill="#aeb4bd" font-size="34" font-weight="500">
    <tspan x="80" dy="0">We parse the commander, mainboard,</tspan>
    <tspan x="80" dy="46">and tokens, validate the build, then</tspan>
    <tspan x="80" dy="46">enrich with Scryfall prints + pricing.</tspan>
  </text>

  <!-- pipeline motif -->
  <g transform="translate(80,1230)">
    <g>
      <rect x="0" y="0" width="200" height="150" rx="22" fill="#141b27" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="100" y="70" fill="#56c6e8" font-size="40" font-weight="800" text-anchor="middle">1</text>
      <text x="100" y="112" fill="#aeb4bd" font-size="22" font-weight="600" text-anchor="middle">Paste</text>
    </g>
    <text x="228" y="90" fill="#56c6e8" font-size="40" font-weight="800" text-anchor="middle">→</text>
    <g transform="translate(256,0)">
      <rect x="0" y="0" width="200" height="150" rx="22" fill="#141b27" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="100" y="70" fill="#56c6e8" font-size="40" font-weight="800" text-anchor="middle">2</text>
      <text x="100" y="112" fill="#aeb4bd" font-size="22" font-weight="600" text-anchor="middle">Validate</text>
    </g>
    <text x="484" y="90" fill="#56c6e8" font-size="40" font-weight="800" text-anchor="middle">→</text>
    <g transform="translate(512,0)">
      <rect x="0" y="0" width="200" height="150" rx="22" fill="#141b27" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="100" y="70" fill="#56c6e8" font-size="40" font-weight="800" text-anchor="middle">3</text>
      <text x="100" y="112" fill="#aeb4bd" font-size="22" font-weight="600" text-anchor="middle">Enrich</text>
    </g>
    <text x="740" y="90" fill="#2fd4a0" font-size="40" font-weight="800" text-anchor="middle">→</text>
    <g transform="translate(768,0)">
      <rect x="0" y="0" width="152" height="150" rx="22" fill="#16241f" stroke="#2fd4a0" stroke-opacity="0.45"/>
      <text x="76" y="68" fill="#2fd4a0" font-size="40" font-weight="800" text-anchor="middle">✓</text>
      <text x="76" y="110" fill="#bdeedd" font-size="22" font-weight="700" text-anchor="middle">Listed</text>
    </g>
  </g>

  <g transform="translate(80,1660)">
    <rect x="0" y="0" width="920" height="96" rx="48" fill="url(#accent)"/>
    <text x="460" y="62" fill="#08110c" font-size="34" font-weight="800" text-anchor="middle" letter-spacing="1">From decklist to listing in minutes</text>
  </g>
  <text x="540" y="1820" fill="#7f8893" font-size="26" font-weight="600" text-anchor="middle" letter-spacing="3">SWIPE UP TO TRY GUEST IMPORT</text>
</svg>
