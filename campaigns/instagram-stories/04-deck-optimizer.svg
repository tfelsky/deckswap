<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1521"/>
      <stop offset="1" stop-color="#080d15"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e3b54a" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e3b54a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowEm" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2fd4a0" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2fd4a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e3b54a"/>
      <stop offset="1" stop-color="#c79433"/>
    </linearGradient>
    <linearGradient id="manaW" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7f0c7"/><stop offset="1" stop-color="#eadf9d"/></linearGradient>
    <linearGradient id="manaU" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8fc7ff"/><stop offset="1" stop-color="#4b88d9"/></linearGradient>
    <linearGradient id="manaB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#726f7f"/><stop offset="1" stop-color="#2c2933"/></linearGradient>
    <linearGradient id="manaR" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff9b73"/><stop offset="1" stop-color="#d74d37"/></linearGradient>
    <linearGradient id="manaG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9dd98e"/><stop offset="1" stop-color="#3f8b54"/></linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="840" cy="560" r="560" fill="url(#glowGold)"/>
  <circle cx="220" cy="1480" r="520" fill="url(#glowEm)"/>

  <g transform="translate(80,150)">
    <path d="M0 6 L26 0 L52 6 L52 34 Q52 52 26 62 Q0 52 0 34 Z" fill="url(#accent)"/>
    <text x="40" y="30" fill="#0a0f18" font-size="22" font-weight="800" text-anchor="middle">M</text>
    <text x="72" y="22" fill="#f6f5ef" font-size="24" font-weight="700" letter-spacing="3">MYTHIVERSE EXCHANGE</text>
    <text x="72" y="50" fill="#7f8893" font-size="17" font-weight="600" letter-spacing="6">DECKSWAP</text>
  </g>

  <!-- WUBRG mana signature (from the site color chooser) -->
  <g transform="translate(80,252)">
    <circle cx="16" cy="0" r="15" fill="url(#manaW)"/>
    <circle cx="54" cy="0" r="15" fill="url(#manaU)"/>
    <circle cx="92" cy="0" r="15" fill="url(#manaB)" stroke="#ffffff" stroke-opacity="0.2"/>
    <circle cx="130" cy="0" r="15" fill="url(#manaR)"/>
    <circle cx="168" cy="0" r="15" fill="url(#manaG)"/>
    <text x="206" y="6" fill="#7f8893" font-size="18" font-weight="700" letter-spacing="3">EVERY COLOR · EVERY DECK</text>
  </g>
  <text x="1000" y="178" fill="#7f8893" font-size="22" font-weight="700" text-anchor="end" letter-spacing="2">04 / 05</text>

  <g transform="translate(80,470)">
    <rect x="0" y="0" width="338" height="58" rx="29" fill="#e3b54a" fill-opacity="0.12" stroke="#e3b54a" stroke-opacity="0.4"/>
    <circle cx="34" cy="29" r="6" fill="#e3b54a"/>
    <text x="58" y="38" fill="#f0d9a3" font-size="22" font-weight="700" letter-spacing="3">DECK OPTIMIZER</text>
  </g>

  <text x="80" y="660" fill="#f6f5ef" font-size="98" font-weight="800" letter-spacing="-2">
    <tspan x="80" dy="0">Upload a deck.</tspan>
    <tspan x="80" dy="112">Grow the</tspan>
    <tspan x="80" dy="112" fill="#e3b54a">buying tree.</tspan>
  </text>

  <text x="80" y="1070" fill="#aeb4bd" font-size="34" font-weight="500">
    <tspan x="80" dy="0">Every printing ranked by price, style fit,</tspan>
    <tspan x="80" dy="46">gameplay relevance, and collection</tspan>
    <tspan x="80" dy="46">confidence — each with a clear next step.</tspan>
  </text>

  <!-- scoring bars motif -->
  <g transform="translate(80,1210)">
    <rect x="0" y="0" width="920" height="330" rx="28" fill="#141b27" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="40" y="62" fill="#f6f5ef" font-size="30" font-weight="800">Ranked upgrade</text>
    <g transform="translate(40,108)" font-size="24" font-weight="600">
      <text x="0" y="20" fill="#aeb4bd">Price</text>
      <rect x="240" y="2" width="640" height="22" rx="11" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="240" y="2" width="560" height="22" rx="11" fill="#e3b54a"/>
      <text x="0" y="76" fill="#aeb4bd">Style fit</text>
      <rect x="240" y="58" width="640" height="22" rx="11" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="240" y="58" width="480" height="22" rx="11" fill="#e3b54a"/>
      <text x="0" y="132" fill="#aeb4bd">Gameplay</text>
      <rect x="240" y="114" width="640" height="22" rx="11" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="240" y="114" width="600" height="22" rx="11" fill="#2fd4a0"/>
      <text x="0" y="188" fill="#aeb4bd">Confidence</text>
      <rect x="240" y="170" width="640" height="22" rx="11" fill="#ffffff" fill-opacity="0.08"/>
      <rect x="240" y="170" width="520" height="22" rx="11" fill="#2fd4a0"/>
    </g>
  </g>

  <g transform="translate(80,1660)">
    <rect x="0" y="0" width="920" height="96" rx="48" fill="url(#accent)"/>
    <text x="460" y="62" fill="#1a1305" font-size="34" font-weight="800" text-anchor="middle" letter-spacing="1">Smarter upgrades, straight to checkout</text>
  </g>
  <text x="540" y="1820" fill="#7f8893" font-size="26" font-weight="600" text-anchor="middle" letter-spacing="3">SWIPE UP TO OPTIMIZE YOUR DECK</text>
</svg>
